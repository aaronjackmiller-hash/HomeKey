name: Ensure PR number link

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize

permissions:
  contents: read
  pull-requests: write

jobs:
  ensure-pr-number-link:
    name: Ensure PR number link
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Put PR number link at top
        uses: actions/github-script@v7
        with:
          script: |
            const { ensurePrNumberLink } = require('./.github/scripts/ensure-pr-number-link');

            const pullRequest = context.payload.pull_request;
            const currentBody = pullRequest.body || '';
            const nextBody = ensurePrNumberLink(
              currentBody,
              pullRequest.number,
              pullRequest.html_url,
            );

            if (nextBody === currentBody) {
              core.info('PR number link is already at the top.');
              return;
            }

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullRequest.number,
              body: nextBody,
            });
