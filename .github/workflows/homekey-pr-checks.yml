name: HomeKey PR checks

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: homekey-pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix backend && npm ci --prefix frontend

      - name: Build frontend
        run: npm run build:frontend

  backend-health:
    name: Backend health smoke
    runs-on: ubuntu-latest
    env:
      PORT: "5000"
      NODE_ENV: development
      MONGODB_URI: mongodb://127.0.0.1:27017/homekey
      JWT_SECRET: ci_jwt_secret
      JWT_EXPIRES_IN: 7d
      ADMIN_SECRET: ci_admin_secret
      YAD2_SYNC_ENABLED: "false"
      LISTING_LIFECYCLE_ENABLED: "false"
    services:
      mongo:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Start backend server
        run: |
          node backend/server.js > /tmp/homekey-backend.log 2>&1 &
          echo $! > /tmp/homekey-backend.pid

      - name: Verify health endpoint
        run: |
          for attempt in {1..30}; do
            response="$(curl -sS http://127.0.0.1:5000/api/health || true)"
            if [ -n "$response" ]; then
              node -e "const payload = JSON.parse(process.argv[1]); if (payload.status === 'ok' && payload.db === 'connected') process.exit(0); process.exit(1);" "$response" && exit 0 || true
            fi
            sleep 2
          done
          echo "Backend health check did not report ready state."
          cat /tmp/homekey-backend.log
          exit 1

      - name: Stop backend server
        if: always()
        run: |
          if [ -f /tmp/homekey-backend.pid ]; then
            kill "$(cat /tmp/homekey-backend.pid)" || true
          fi
