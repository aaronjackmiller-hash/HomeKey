version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - '5000:5000'
    environment:
      MONGODB_URI: mongodb://mongo:27017/homekey
      JWT_SECRET: change_this_to_a_long_random_secret
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
      PORT: 5000
    depends_on:
      - mongo
  frontend:
    build:
      context: ./frontend
    ports:
      - '80:80'
    depends_on:
      - backend
  mongo:
    image: mongo:6
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
