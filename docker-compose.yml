version: '3.8'

services:
  mongodb:
    image: mongo:6
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    ports:
      - '5000:5000'
    environment:
      MONGO_URI: mongodb://mongodb:27017/homekey
      PORT: 5000
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  mongo_data:
