version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - '5000:5000'
    environment:
      MONGO_URI: mongodb://mongo:27017/homekey
      PORT: 5000
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
    ports:
      - '3000:3000'
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend

  mongo:
    image: mongo:5.0
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: