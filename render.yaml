# render.yaml — Render.com Blueprint
# One free web service hosts both the React frontend and the Express/MongoDB backend.
#
# SETUP STEPS (one time):
#   1. Create a free MongoDB Atlas cluster at https://cloud.mongodb.com
#      and copy the connection string (mongodb+srv://...).
#   2. Push this repo to GitHub (or it is already there).
#   3. Go to https://render.com → New → Blueprint → connect this repo.
#   4. Render will detect this file and create the "homekey" service automatically.
#   5. In the Render dashboard, set the MONGODB_URI environment variable to
#      your Atlas connection string.
#   6. Done — your beta site will be live at the URL Render assigns.

services:
  - type: web
    name: homekey
    env: node
    plan: free
    # Build: install deps, build React frontend, verify output, install backend deps.
    # Uses the root render-build script which includes memory flags and a build guard.
    buildCommand: npm run render-build
    # Start: Express serves both the API and the built React app
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      # Paste your MongoDB Atlas connection string in the Render dashboard
      - key: MONGODB_URI
        sync: false
      # Render auto-generates a secure random value for JWT_SECRET
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      # Admin secret for the POST /api/admin/seed endpoint
      - key: ADMIN_SECRET
        generateValue: true
      # Optional Yad2 live sync controls
      - key: YAD2_SYNC_ENABLED
        value: true
      - key: LIVE_YAD2_ONLY
        value: true
      - key: YAD2_REAL_SCRAPE_ONLY
        value: true
      # Provider mode: native scrape/feed | apify
      - key: YAD2_PROVIDER
        value: apify
      # Apify provider credentials/configuration
      - key: APIFY_TOKEN
        sync: false
      - key: APIFY_DATASET_ID
        sync: false
      # Optional alternative: full dataset items URL (supports signed URLs)
      - key: APIFY_DATASET_ITEMS_URL
        sync: false
      - key: APIFY_MAX_ITEMS
        value: 120
      - key: APIFY_TIMEOUT_MS
        value: 90000
      - key: APIFY_DATASET_CLEAN
        value: true
