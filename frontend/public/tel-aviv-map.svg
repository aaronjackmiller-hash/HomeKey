      <path d="M0 24.5 H34 M24.5 0 V34" stroke="#ced3d9" stroke-width="0.9" />
    </pattern>
    <pattern id="microRoads" width="62" height="62" patternUnits="userSpaceOnUse">
      <path d="M0 10 L62 22 M0 30 L62 42 M10 0 L26 62 M34 0 L50 62" stroke="#c4c9cf" stroke-width="1.1" fill="none" />
      <path d="M4 54 L54 4" stroke="#cbced4" stroke-width="0.9" fill="none" />
    </pattern>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="2" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06" />
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#land)" />

