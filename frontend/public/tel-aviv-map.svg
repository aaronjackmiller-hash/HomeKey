<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Tel Aviv grayscale map background">
  <defs>
    <linearGradient id="land" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dedfe2" />
      <stop offset="100%" stop-color="#d4d7db" />
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#b2b6bb" />
      <stop offset="100%" stop-color="#a7acb2" />
    </linearGradient>
    <linearGradient id="fadeBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1" />
    </linearGradient>
    <pattern id="cityBlocks" width="34" height="34" patternUnits="userSpaceOnUse">
      <rect width="34" height="34" fill="none" />
      <rect x="1" y="1" width="13" height="10" fill="#e6e8eb" />
      <rect x="18" y="2" width="14" height="11" fill="#dde1e5" />
